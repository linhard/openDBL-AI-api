    name: tokenizer-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    region: oregon
    plan: free
    envVars:
      - key: DB_USER
        value: KLAUS
      - key: DB_PASSWORD
        value: !monCarapach0
      - key: DB_DSN
        value: myadb_high.adb.eu-frankfurt-1.oraclecloud.com
